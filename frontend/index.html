<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q.E.S</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#000;
    color:#fff;
}

.container {
    display:flex;
}

.sidebar {
    width:220px;
    background:#0b0b0b;
    padding:20px;
    border-right:1px solid #222;
}

.sidebar h2 {
    color:#c6a15b;
}

.content {
    flex:1;
    padding:20px;
}

.cards {
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.card {
    flex:1;
    border:1px solid #c6a15b;
    border-radius:10px;
    padding:15px;
}

.card h3 {
    margin:0;
    color:#aaa;
}

.card p {
    font-size:20px;
    margin:5px 0;
}

.chart-container {
    display:flex;
    gap:20px;
}

canvas {
    background:#111;
    border-radius:10px;
    padding:10px;
}
</style>

</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>QUEIROZ</h2>
        <p>Dashboard</p>
        <p>Q - Qualificação</p>
        <p>E - Estruturação</p>
        <p>S - Sustentação</p>
    </div>

    <div class="content">

        <h1 style="color:#c6a15b;">Q.E.S</h1>
        <p>Transformando riscos em resultados</p>

        <div class="cards">
            <div class="card">
                <h3>Faturamento</h3>
                <p>R$ 245750</p>
            </div>
            <div class="card">
                <h3>Lucro</h3>
                <p>R$ 45890</p>
            </div>
            <div class="card">
                <h3>Margem</h3>
                <p>18.6%</p>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="grafico"></canvas>
            <canvas id="pizza"></canvas>
        </div>

    </div>

</div>

<!-- SCRIPT ÚNICO E CORRETO -->
<script>

// 🔒 LOGIN
const user = localStorage.getItem("user");

if (!user) {

    document.body.innerHTML = `
        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#000;
            color:#c6a15b;
            flex-direction:column;
        ">
            <h1>Q.E.S</h1>
            <p>Faça login para acessar o sistema</p>
            <button onclick="login()" style="
                padding:10px 20px;
                background:#c6a15b;
                border:none;
                cursor:pointer;
                margin-top:10px;
            ">Entrar</button>
        </div>
    `;

} else {

    // 📊 GRÁFICO
    new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: ["Jan","Fev","Mar","Abr","Mai"],
            datasets: [
                {label:"Receita", data:[200,250,300,350,400], backgroundColor:"#c6a15b"},
                {label:"Despesas", data:[150,180,220,260,300], backgroundColor:"#666"},
                {type:"line", label:"Lucro", data:[50,70,80,90,100], borderColor:"#c6a15b"}
            ]
        }
    });

    // 🥧 PIZZA
    new Chart(document.getElementById("pizza"), {
        type: "doughnut",
        data: {
            labels: ["Custos","Fixas","Variáveis","Outros"],
            datasets: [{
                data: [52,23,15,10],
                backgroundColor: ["#c6a15b","#888","#aaa","#555"]
            }]
        }
    });

}

// 🔓 LOGIN
function login(){
    localStorage.setItem("user", "admin");
    location.reload();
}

</script>

</body>
</html>
